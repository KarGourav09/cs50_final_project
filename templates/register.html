{% extends "layout.html" %}
{% block title %}Register{% endblock %}
{% block main %}
<div class="auth-page">
    <div class="auth-copy">
        <div class="hero-eyebrow">Join FreshlyFridge</div>
        <h1>Build a brighter way to cook what you have.</h1>
        <p>Create an account to discover recipes from your ingredients and save the meals you want to make again.</p>
    </div>
    <div class="form-card">
        <h2>Create Account</h2>
        <form action="/register" method="post">
            <div class="form-group">
                <input autocomplete="off" autofocus class="form-control" name="username" placeholder="Username" type="text" required>
            </div>
            <div class="form-group">
                <input class="form-control" name="password" placeholder="Password" type="password" required>
            </div>
            <div class="form-group">
                <input class="form-control" name="confirmation" placeholder="Confirm Password" type="password" required>
            </div>
            <button class="btn-fresh primary-action" type="submit">
                <span class="btn-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24"><path d="M10 17l5-5-5-5v10z"/></svg>
                </span>
                Register
            </button>
        </form>
    </div>
</div>
{% endblock %}
