{% extends "layout.html" %}
{% block title %}Log In{% endblock %}
{% block main %}
<div class="auth-page">
    <div class="auth-copy">
        <div class="hero-eyebrow">Welcome back</div>
        <h1>Fresh ideas start with your fridge.</h1>
        <p>Sign in to search recipe matches, save your favourites, and keep tonight's ingredients moving.</p>
    </div>
    <div class="form-card">
        <h2>Welcome Back</h2>
        <form action="/login" method="post">
            <div class="form-group">
                <input autocomplete="off" autofocus class="form-control" name="username" placeholder="Username" type="text" required>
            </div>
            <div class="form-group">
                <input class="form-control" name="password" placeholder="Password" type="password" required>
            </div>
            <button class="btn-fresh primary-action" type="submit">
                <span class="btn-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24"><path d="M10 17l5-5-5-5v10z"/></svg>
                </span>
                Log In
            </button>
        </form>
    </div>
</div>
{% endblock %}
